name: prek autoupdate

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Run prek autoupdate
        run: uvx prek auto-update
      - name: Open PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet -- .pre-commit-config.yaml; then
            echo "No hook updates."
            exit 0
          fi
          branch="chore/prek-autoupdate-$(date -u +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add .pre-commit-config.yaml
          git commit -m "chore: prek autoupdate"
          git push --set-upstream origin "$branch"
          gh pr create \
            --title "chore: prek autoupdate" \
            --body "Automated hook version bump via \`prek autoupdate\`." \
            --base main \
            --head "$branch"
