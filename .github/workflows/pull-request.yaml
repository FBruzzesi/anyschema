name: "PR Checks"

on:
  pull_request:

env:
  DEFAULT_PYTHON: "3.14"

jobs:
  pytest:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        run: uv run --all-extras --group testing pytest tests --cov=src --cov=tests
      - name: Run doctest
        if: matrix.python-version == '3.14'
        run: uv run --all-extras --group testing pytest src --doctest-modules

  minimum_versions:
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        run: |
          uv run \
          --with narwhals==2.16.0,attrs==22.1.0,pydantic==2.0.0,sqlalchemy==2.0.0 \
          --all-extras --group testing \
          pytest tests --cov=anyschema --cov=tests --cov-fail-under=95

  typing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Run type checking
        run: make typing

  zensical-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Build docs strict mode
        run: make docs-build

  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d # v2.0.5
