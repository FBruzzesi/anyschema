name: "PR Checks"

on:
  pull_request:

env:
  DEFAULT_PYTHON: "3.14"

jobs:
  pytest:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        run: uv run --all-extras --group tests pytest tests --cov=src --cov=tests
      - name: Run doctest
        if: matrix.python-version == '3.14'
        run: uv run --all-extras --group tests pytest src --doctest-modules

  minimum_versions:
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Run pytest
        run: |
          uv run \
          --with narwhals==2.16.0,attrs==22.1.0,pydantic==2.0.0,sqlalchemy==2.0.0 \
          --all-extras --group tests \
          pytest tests --cov=anyschema --cov=tests --cov-fail-under=95

  typing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Run type checking
        run: make typing

  mkdocs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Build docs strict mode
        run: uv run --all-extras --group docs mkdocs build --strict

  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Run ruff linter and formatter
        run: make lint

  rumdl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          enable-cache: "true"
          cache-dependency-glob: "pyproject.toml"
      - name: Run rumdl linter and formatter
        run: |
          uv tool run rumdl version
          uv tool run rumdl config --no-defaults
          uv tool run rumdl check --output-format=github .

  check-typos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check for typos
        uses: crate-ci/typos@master
        with:
          files: .
