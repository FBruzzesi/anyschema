repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: 'v0.15.20'
  hooks:
    - id: ruff-format
    - id: ruff-check
- repo: https://github.com/rvben/rumdl-pre-commit
  rev: v0.2.27
  hooks:
    - id: rumdl      # Lint only; add args [--fix] to auto-fix
    - id: rumdl-fmt  # Pure format, always exits 0
- repo: https://github.com/codespell-project/codespell
  rev: 'v2.4.2'
  hooks:
    - id: codespell
      files: \.(py|rst|md)$
      args: [--ignore-words-list=ser]
- repo: https://github.com/adamchainz/blacken-docs
  rev: "1.20.0"  # replace with latest tag on GitHub
  hooks:
  -   id: blacken-docs
      args: [--skip-errors]
      additional_dependencies:
      - black==22.12.0
- repo: https://github.com/adhtruong/mirrors-typos
  # Use mirror to avoid autoupdate issue: https://github.com/crate-ci/typos/issues/390
  rev: 'v1.47.2'
  hooks:
    - id: typos
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  -   id: trailing-whitespace
  -   id: name-tests-test
      exclude: |
        (?x)
          ^(tests/pydantic/utils\.py)
  -   id: end-of-file-fixer
  -   id: requirements-txt-fixer
  -   id: no-commit-to-branch
  -   id: check-json
  -   id: check-yaml
  -   id: check-ast
  -   id: check-added-large-files
